name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.1）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            ext: .exe
            artifact_name: CedarLicenseTool-windows-amd64
          - os: ubuntu-latest
            platform: linux/amd64
            ext: ''
            artifact_name: CedarLicenseTool-linux-amd64
          - os: macos-latest
            platform: darwin/amd64
            ext: ''
            artifact_name: CedarLicenseTool-darwin-amd64
          - os: macos-latest
            platform: darwin/arm64
            ext: ''
            artifact_name: CedarLicenseTool-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version for manual build
        if: github.event_name == 'workflow_dispatch'
        run: node -e "const fs=require('fs');const v='${{ github.event.inputs.version }}';const j=JSON.parse(fs.readFileSync('wails.json','utf8'));j.productVersion=v;fs.writeFileSync('wails.json',JSON.stringify(j,null,2)+'\n');console.log('version:',v);"

      - name: Set version for tag build
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "const fs=require('fs');const v='$VERSION';const j=JSON.parse(fs.readFileSync('wails.json','utf8'));j.productVersion=v;fs.writeFileSync('wails.json',JSON.stringify(j,null,2)+'\n');console.log('version:',v);"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Get Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          CGO_ENABLED: 1
        run: wails build -platform ${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/CedarLicenseTool${{ matrix.ext }}

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CedarLicenseTool-windows-amd64
          path: build/artifacts

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CedarLicenseTool-linux-amd64
          path: build/artifacts

      - name: Download darwin-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: CedarLicenseTool-darwin-amd64
          path: build/artifacts

      - name: Download darwin-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: CedarLicenseTool-darwin-arm64
          path: build/artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
