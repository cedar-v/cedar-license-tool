name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'releasev*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.1）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            ext: .exe
            artifact_name: CedarLicenseTool-windows-amd64
          - os: ubuntu-latest
            platform: linux/amd64
            ext: ''
            artifact_name: CedarLicenseTool-linux-amd64
          - os: macos-latest
            platform: darwin/amd64
            ext: ''
            artifact_name: CedarLicenseTool-darwin-amd64
          - os: macos-latest
            platform: darwin/arm64
            ext: ''
            artifact_name: CedarLicenseTool-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version
        run: node -e "
            const fs = require('fs');
            let v;
            if ('${{ github.event_name }}' === 'workflow_dispatch') {
              v = '${{ github.event.inputs.version }}';
            } else {
              const ref = '${{ github.ref }}';
              v = ref.replace('refs/tags/v', '').replace('refs/tags/releasev', '');
            }
            const j = JSON.parse(fs.readFileSync('wails.json', 'utf8'));
            j.productVersion = v;
            fs.writeFileSync('wails.json', JSON.stringify(j, null, 2) + '\n');
            console.log('version:', v);
          "

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Get Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        env:
          CGO_ENABLED: 1
        run: wails build -platform ${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/CedarLicenseTool${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/artifacts
        continue-on-error: true

      - name: Check artifacts
        id: check
        run: |
          COUNT=$(find build/artifacts -type f | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -eq 0 ]; then
            echo "No artifacts found, skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/artifacts/CedarLicenseTool-windows-amd64.exe
            build/artifacts/CedarLicenseTool-linux-amd64
            build/artifacts/CedarLicenseTool-darwin-amd64
            build/artifacts/CedarLicenseTool-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
